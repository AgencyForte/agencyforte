name: AgencyForte Daily Diff Pipeline

on:
  # Runs at 08:00 UTC every day (2:00 AM Central Standard Time)
  schedule:
    - cron: '0 8 * * *'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          
      - name: Cache TDI Data
        uses: actions/cache@v3
        with:
          path: pipeline/yesterday_tdi.csv
          key: tdi-data-${{ github.run_id }}
          restore-keys: |
            tdi-data-

      - name: Run Anti-Join Diff Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd pipeline
          python pipeline.py
